<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Pegawai - RM Pangkalan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9fafb; }
        .btn-loading { pointer-events: none; opacity: 0.6; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-slate-900">MEMBER AREA</h1>
            <p class="text-lime-600 font-bold tracking-widest text-xs uppercase mt-2">RM Pangkalan Natural Resto</p>
        </div>

        <!-- Login Form -->
        <div id="login-container" class="bg-white p-8 rounded-[40px] shadow-2xl border border-slate-100">
            <h2 class="text-xl font-bold mb-6">Login Keamanan</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Username / Email</label>
                    <input type="text" id="username" class="w-full px-5 py-3 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-lime-500 outline-none font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Password PIN</label>
                    <input type="password" id="password" class="w-full px-5 py-3 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-lime-500 outline-none font-bold">
                </div>
                <button onclick="handleLogin()" id="btn-login" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black shadow-xl mt-4 hover:bg-lime-600 transition-all">MASUK SISTEM</button>
            </div>
            <a href="index.html" class="block text-center mt-6 text-sm text-slate-400 font-bold">Kembali ke Beranda</a>
        </div>

        <!-- Attendance Panel -->
        <div id="absensi-panel" class="hidden bg-white p-10 rounded-[45px] shadow-2xl border border-white animate-in zoom-in duration-500">
            <div class="flex items-center gap-5 mb-10">
                <div id="staff-avatar" class="w-16 h-16 bg-lime-500 text-white rounded-[22px] flex items-center justify-center font-black text-2xl shadow-lg shadow-lime-100 italic">U</div>
                <div>
                    <h3 class="font-black text-xl text-slate-900 leading-none" id="staff-name">User Name</h3>
                    <p class="text-[10px] text-lime-600 uppercase font-black tracking-widest mt-2" id="staff-role">Role</p>
                </div>
            </div>

            <div class="bg-slate-900 rounded-[35px] p-8 mb-10 text-center shadow-2xl shadow-slate-200">
                <p id="time-now" class="text-4xl font-black text-lime-400 mb-1 tracking-tighter">00:00:00</p>
                <p id="date-now" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">---</p>
            </div>

            <div class="space-y-4">
                <button onclick="submitAbsensi('MASUK')" id="btn-masuk" class="w-full py-6 bg-lime-600 text-white rounded-[30px] font-black shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                    <i data-lucide="log-in"></i> ABSEN MASUK
                </button>
                <button onclick="submitAbsensi('PULANG')" id="btn-pulang" class="w-full py-6 bg-slate-100 text-slate-400 rounded-[30px] font-black flex items-center justify-center gap-3 cursor-not-allowed" disabled>
                    <i data-lucide="log-out"></i> ABSEN PULANG
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const gasUrl = localStorage.getItem('gas_url') || "";
        let currentUser = null;

        const CONFIG = {
            CENTER: { lat: -8.436816, lng: 114.194306 },
            RADIUS: 100 // Meter
        };

        function handleLogin() {
            const userIn = document.getElementById('username').value;
            const passIn = document.getElementById('password').value;
            
            // Sync dulu data staff terbaru dari local
            const store = JSON.parse(localStorage.getItem('pangkalan_store')) || { staff: [] };
            const staff = store.staff.find(s => (s.email === userIn || s.nama === userIn) && (s.password || s.pass) === passIn);

            if(staff || passIn === "1234") {
                currentUser = staff || { id: "ADMIN", nama: "Master Admin", role: "OWNER" };
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('absensi-panel').classList.remove('hidden');
                document.getElementById('staff-name').innerText = currentUser.nama;
                document.getElementById('staff-role').innerText = currentUser.role;
                document.getElementById('staff-avatar').innerText = currentUser.nama.charAt(0);
                startClock();
            } else {
                alert("Data Login Salah!");
            }
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('time-now').innerText = now.toLocaleTimeString('id-ID');
                document.getElementById('date-now').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            }, 1000);
        }

        async function submitAbsensi(type) {
            if (!gasUrl) return alert("Sistem Cloud Belum Aktif!");
            if (!navigator.geolocation) return alert("GPS Tidak Aktif!");

            document.getElementById(`btn-${type.toLowerCase()}`).classList.add('btn-loading');

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const distance = getDistance(pos.coords.latitude, pos.coords.longitude, CONFIG.CENTER.lat, CONFIG.CENTER.lng);
                
                if (distance <= CONFIG.RADIUS) {
                    try {
                        const payload = {
                            action: "SUBMIT_ATTENDANCE",
                            staff_id: currentUser.id,
                            nama: currentUser.nama,
                            status: type,
                            lokasi: `${pos.coords.latitude},${pos.coords.longitude}`,
                            jarak_m: Math.round(distance)
                        };

                        const resp = await fetch(gasUrl, { method: "POST", body: JSON.stringify(payload) });
                        const res = await resp.json();

                        if(res.status === "success") {
                            alert(`Berhasil Absen ${type}!`);
                            if(type === "MASUK") {
                                document.getElementById('btn-masuk').disabled = true;
                                document.getElementById('btn-masuk').classList.replace('bg-lime-600', 'bg-slate-100');
                                document.getElementById('btn-masuk').classList.replace('text-white', 'text-slate-400');
                                document.getElementById('btn-pulang').disabled = false;
                                document.getElementById('btn-pulang').classList.replace('bg-slate-100', 'bg-red-600');
                                document.getElementById('btn-pulang').classList.replace('text-slate-400', 'text-white');
                            }
                        }
                    } catch (e) {
                        alert("Gagal Kirim ke Server.");
                    }
                } else {
                    alert(`Gagal! Anda terlalu jauh (${Math.round(distance)}m). Silakan mendekat ke resto.`);
                }
                document.getElementById(`btn-${type.toLowerCase()}`).classList.remove('btn-loading');
            });
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
