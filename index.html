<!DOCTYPE html>

    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; }
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: white; border-right: 1px solid #f0f0f0; }
        .main-content { margin-left: 260px; min-height: 100vh; padding: 24px; }
        .hero-banner {

            background-size: cover; background-position: center;
        }
        @media (max-width: 1023px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding-bottom: 100px; }
            .floating-pill { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 50; }
        }
        .nav-link-active { background-color: #84cc16; color: white; border-radius: 12px; }
    </style>
</head>
<body class="antialiased text-slate-800">

                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-3 text-sm text-slate-500 hover:bg-slate-50 rounded-xl transition pl-10">Makanan</a>
                    <a href="#" class="flex items-center gap-3 px-4 py-3 text-sm text-slate-500 hover:bg-slate-50 rounded-xl transition pl-10">Segeran</a>
                    <a href="#" class="flex items-center gap-3 px-4 py-3 text-sm text-slate-500 hover:bg-slate-50 rounded-xl transition pl-10">Wedangan</a>
                </nav>
            </div>

            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest">Layanan</p>
                <nav class="space-y-1">
                    <a href="order-online.html" class="flex items-center gap-3 px-4 py-3 text-sm text-slate-500 hover:bg-slate-50 rounded-xl transition">

                    <a href="absensi.html" class="flex items-center gap-3 px-4 py-3 text-sm text-slate-500 hover:bg-slate-50 rounded-xl transition">

                </nav>
            </div>

    <!-- MAIN CONTENT -->

            <button class="bg-white border text-slate-500 px-6 py-2 rounded-xl text-sm font-bold">SEGERAN</button>

            <button class="bg-white border text-slate-500 px-6 py-2 rounded-xl text-sm font-bold">CAMILAN</button>
        </div>

        <!-- Menu Grid -->
        <div id="menu-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Data Dummy akan muncul di sini -->
            <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition group">

                <p class="text-lime-600 font-black mt-1">Rp 28.000</p>

        </div>

        <!-- Empty State (like in image) -->
        <div id="empty-state" class="hidden py-20 text-center">
            <p class="text-slate-300 font-bold uppercase tracking-widest text-sm italic">MENU TIDAK DITEMUKAN</p>
        </div>

    <!-- MOBILE NAVIGATION PILL -->
    <div class="lg:hidden floating-pill bg-white/80 backdrop-blur-lg border border-white/50 px-8 py-4 rounded-full flex gap-10 shadow-2xl items-center">

        <button class="relative text-slate-400">

            <span class="absolute -top-2 -right-2 bg-lime-600 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
