<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RM Pangkalan - Natural & Healthy Resto</title>
    
    <!-- Konfigurasi PWA -->
    <meta name="theme-color" content="#84cc16">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/84cc16/ffffff?text=RM">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .hero-gradient {
            background: linear-gradient(rgba(15, 23, 42, 0.5), rgba(15, 23, 42, 0.7)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&q=80&w=1200');
            background-size: cover;
            background-position: center;
        }

        .card-menu {
            background: white;
            border: 1px solid rgba(132, 204, 22, 0.05);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }
        
        @media (min-width: 1024px) {
            .card-menu:hover {
                transform: translateY(-8px);
                box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05);
            }
        }

        .category-pill { transition: all 0.3s ease; border: 1px solid #f1f5f9; white-space: nowrap; }
        .category-pill.active { background: #84cc16; color: white; border-color: #84cc16; box-shadow: 0 8px 15px -3px rgba(132, 204, 22, 0.2); }

        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #sync-toast {
            position: fixed; top: 12px; right: 12px; z-index: 100;
            transform: translateX(120%); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #sync-toast.show { transform: translateX(0); }

        .floating-cart {
            position: fixed; bottom: 85px; right: 16px; z-index: 60;
            transform: scale(0); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .floating-cart.show { transform: scale(1); }

        /* Modal & Sidebar Styles */
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 70; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .overlay.show { opacity: 1; pointer-events: auto; }
        
        .sidebar-cart { position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 400px; background: white; z-index: 80; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .sidebar-cart.show { transform: translateX(0); }

        .modal-detail { position: fixed; bottom: 0; left: 0; right: 0; background: white; z-index: 80; border-radius: 32px 32px 0 0; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); max-height: 90vh; overflow-y: auto; }
        @media (min-width: 768px) {
            .modal-detail { position: fixed; top: 50%; left: 50%; bottom: auto; transform: translate(-50%, -40%); width: 90%; max-width: 500px; border-radius: 40px; opacity: 0; }
            .modal-detail.show { transform: translate(-50%, -50%); opacity: 1; }
        }
        .modal-detail.show { transform: translateY(0); }
        @media (min-width: 768px) { .modal-detail.show { transform: translate(-50%, -50%); } }
    </style>
</head>
<body class="antialiased min-h-screen">

    <!-- Notifikasi Sinkronisasi -->
    <div id="sync-toast" class="bg-slate-900 text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 border border-white/10">
        <div class="w-1.5 h-1.5 bg-lime-500 rounded-full animate-pulse"></div>
        <span id="toast-text" class="text-[9px] font-black uppercase tracking-widest leading-none">Cloud Connected</span>
    </div>

    <!-- Overlay Global -->
    <div id="global-overlay" class="overlay" onclick="closeAllUI()"></div>

    <!-- Sidebar Keranjang -->
    <aside id="cart-sidebar" class="sidebar-cart flex flex-col">
        <div class="p-6 border-b flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i data-lucide="shopping-cart" class="text-lime-500 w-5 h-5"></i>
                <h3 class="text-lg font-black tracking-tighter uppercase">Keranjang</h3>
            </div>
            <button onclick="closeAllUI()" class="p-2 hover:bg-slate-100 rounded-xl transition-colors"><i data-lucide="x" class="text-slate-400 w-5 h-5"></i></button>
        </div>
        <div id="sidebar-cart-list" class="flex-1 overflow-y-auto p-6 space-y-4">
            <!-- Item keranjang -->
        </div>
        <div class="p-6 bg-slate-50 border-t">
            <div class="flex justify-between items-center mb-4">
                <span class="font-bold text-slate-400 text-[10px] uppercase tracking-widest">Estimasi Total</span>
                <span id="sidebar-total" class="font-black text-xl text-slate-900">Rp 0</span>
            </div>
            <a href="order-online.html" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-[10px] flex items-center justify-center gap-3 shadow-xl active:bg-lime-600 transition-all">
                Checkout Pesanan <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </a>
        </div>
    </aside>

    <!-- Modal Detail Produk -->
    <div id="product-modal" class="modal-detail p-6 md:p-8 no-scrollbar">
        <div class="w-12 h-1 bg-slate-100 rounded-full mx-auto mb-6 md:hidden"></div>
        <button onclick="closeAllUI()" class="hidden md:flex absolute top-6 right-6 w-10 h-10 bg-slate-100 rounded-full items-center justify-center text-slate-400 z-10"><i data-lucide="x"></i></button>
        <div id="modal-content">
            <!-- Konten detail -->
        </div>
    </div>

    <!-- Sidebar Desktop -->
    <aside class="fixed left-0 top-0 bottom-0 w-72 bg-white border-r border-slate-100 p-8 hidden lg:flex flex-col z-50">
        <div class="mb-12">
            <h1 class="text-3xl font-black italic text-slate-900 tracking-tighter">Pangkalan.</h1>
            <p class="text-[10px] font-extrabold text-lime-600 uppercase tracking-[0.3em] mt-2">Natural & Healthy</p>
        </div>
        
        <nav class="flex-1 space-y-1">
            <a href="index.html" class="w-full flex items-center gap-4 px-6 py-4 bg-lime-50 text-lime-600 rounded-2xl font-bold transition-all">
                <i data-lucide="home" class="w-5 h-5"></i> Beranda
            </a>
            <a href="order-online.html" class="w-full flex items-center gap-4 px-6 py-4 text-slate-400 hover:bg-slate-50 hover:text-slate-900 rounded-2xl font-bold transition-all">
                <i data-lucide="shopping-bag" class="w-5 h-5"></i> Pesan Online
            </a>
            <a href="absensi.html" class="w-full flex items-center gap-4 px-6 py-4 text-slate-400 hover:bg-slate-50 hover:text-slate-900 rounded-2xl font-bold transition-all">
                <i data-lucide="user-check" class="w-5 h-5"></i> Area Staff
            </a>
        </nav>
    </aside>

    <!-- Konten Utama -->
    <main class="lg:ml-72 pb-20">
        
        <!-- Navigasi Atas (Mobile) - Padding Minim -->
        <header class="p-3 md:p-6 flex lg:hidden justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-50">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-lime-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-lime-100"><i data-lucide="leaf" class="w-4 h-4"></i></div>
                <h1 class="text-xl font-black italic text-slate-900 tracking-tighter">Pangkalan.</h1>
            </div>
            <button onclick="syncMenu()" class="p-2.5 bg-slate-50 rounded-xl text-slate-400 active:bg-slate-100 transition-colors">
                <i data-lucide="refresh-cw" id="sync-icon" class="w-5 h-5"></i>
            </button>
        </header>

        <!-- Bagian Hero - Padding Minim Mobile -->
        <section class="p-2 md:p-6">
            <div class="hero-gradient h-48 md:h-[350px] rounded-[30px] md:rounded-[50px] flex items-center px-6 md:px-12 relative overflow-hidden shadow-xl shadow-slate-200/50">
                <div class="max-w-xl fade-in">
                    <span class="px-3 py-1 bg-lime-500 text-white rounded-full text-[8px] font-black uppercase tracking-widest shadow-lg">New Organic Menu</span>
                    <h2 class="text-3xl md:text-5xl font-black text-white tracking-tighter leading-none mt-3 italic">
                        Keajaiban <br><span class="text-lime-500">Rasa Alami.</span>
                    </h2>
                </div>
            </div>
        </section>

        <!-- Eksplorasi Menu - Spasi Rapat -->
        <section class="p-2 md:p-6 mt-2">
            <div class="flex flex-col gap-4 mb-6 px-1">
                <div class="flex justify-between items-end">
                    <div>
                        <h3 class="text-lg md:text-2xl font-black text-slate-900 tracking-tighter uppercase leading-none">Pilihan Menu</h3>
                        <p class="text-[9px] text-slate-400 font-bold mt-1 uppercase tracking-widest" id="menu-count">Memuat...</p>
                    </div>
                </div>
                
                <!-- Filter Kategori - Scrollable Horizontal -->
                <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                    <button onclick="filterCategory('ALL')" class="category-pill active px-5 py-2.5 rounded-xl font-black text-[9px] uppercase tracking-widest bg-white shadow-sm" id="cat-ALL">Semua</button>
                    <button onclick="filterCategory('MAKANAN')" class="category-pill px-5 py-2.5 rounded-xl font-black text-[9px] uppercase tracking-widest bg-white text-slate-400 shadow-sm" id="cat-MAKANAN">Makanan</button>
                    <button onclick="filterCategory('SEGERAN')" class="category-pill px-5 py-2.5 rounded-xl font-black text-[9px] uppercase tracking-widest bg-white text-slate-400 shadow-sm" id="cat-SEGERAN">Segeran</button>
                    <button onclick="filterCategory('WEDANGAN')" class="category-pill px-5 py-2.5 rounded-xl font-black text-[9px] uppercase tracking-widest bg-white text-slate-400 shadow-sm" id="cat-WEDANGAN">Wedangan</button>
                    <button onclick="filterCategory('CAMILAN')" class="category-pill px-5 py-2.5 rounded-xl font-black text-[9px] uppercase tracking-widest bg-white text-slate-400 shadow-sm" id="cat-CAMILAN">Camilan</button>
                </div>
            </div>

            <!-- Grid Menu - 2 Kolom Mobile dengan Gap Minim -->
            <div id="menu-grid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-2 md:gap-6">
                <!-- Data dimuat di sini -->
                <div class="animate-pulse bg-slate-100 h-48 rounded-3xl"></div>
                <div class="animate-pulse bg-slate-100 h-48 rounded-3xl"></div>
            </div>

            <!-- State Kosong -->
            <div id="empty-state" class="hidden py-20 flex flex-col items-center justify-center opacity-20 text-center">
                <i data-lucide="utensils" class="w-12 h-12 mb-4"></i>
                <p class="text-xs font-black uppercase tracking-widest">Menu sedang disiapkan</p>
            </div>
        </section>
    </main>

    <!-- Floating Cart - Lebih Kecil & Kompak -->
    <div id="floating-cart" onclick="toggleCartSidebar()" class="floating-cart bg-slate-900 text-white p-3 pr-5 rounded-2xl shadow-2xl flex items-center gap-3 border border-white/10 active:scale-95 cursor-pointer">
        <div class="relative bg-lime-500 p-2.5 rounded-xl">
            <i data-lucide="shopping-bag" class="w-5 h-5 text-white"></i>
            <span id="cart-count" class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[7px] font-black w-4 h-4 rounded-full flex items-center justify-center border-2 border-slate-900">0</span>
        </div>
        <div>
            <p class="text-[7px] font-black uppercase text-slate-400 tracking-widest leading-none mb-1">Check</p>
            <p id="floating-total" class="text-[10px] font-black uppercase tracking-tighter leading-none text-lime-400">Rp 0</p>
        </div>
    </div>

    <!-- Navigasi Bawah Mobile - Minimalis -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-slate-100 px-2 py-3 flex justify-around items-center lg:hidden z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
        <a href="index.html" class="text-lime-600 flex flex-col items-center gap-1">
            <i data-lucide="layout-grid" class="w-5 h-5"></i>
            <span class="text-[7px] font-black uppercase tracking-widest">Home</span>
        </a>
        <a href="order-online.html" class="text-slate-300 flex flex-col items-center gap-1">
            <i data-lucide="package" class="w-5 h-5"></i>
            <span class="text-[7px] font-black uppercase tracking-widest">Order</span>
        </a>
        <a href="absensi.html" class="text-slate-300 flex flex-col items-center gap-1">
            <i data-lucide="user" class="w-5 h-5"></i>
            <span class="text-[7px] font-black uppercase tracking-widest">Staff</span>
        </a>
    </nav>

    <script>
        // --- MESIN CLOUD ---
        let menus = [];
        const DEFAULT_GAS_URL = "https://script.google.com/macros/s/AKfycbx3OAbYKkZRD-Gws1bGu4C1c58IAg9ZAHjkb1jSjaGISBT_03J7PX3BDUBV9vvo08W_/exec";
        const gasUrl = localStorage.getItem('gas_url') || DEFAULT_GAS_URL;

        async function syncMenu() {
            const icon = document.getElementById('sync-icon');
            if(icon) icon.classList.add('animate-spin');
            
            try {
                const response = await fetch(`${gasUrl}?v=${Date.now()}`);
                const result = await response.json();
                
                if(result.status === "success") {
                    menus = result.data.menus.filter(m => m.status === 'Aktif');
                    renderMenu();
                    showToast("Menu Terhubung Cloud");
                    updateCartUI();
                }
            } catch (err) {
                renderEmpty();
            } finally {
                if(icon) icon.classList.remove('animate-spin');
            }
        }

        function renderMenu(filter = "ALL") {
            const grid = document.getElementById('menu-grid');
            const empty = document.getElementById('empty-state');
            if(!grid) return;
            
            const filtered = filter === "ALL" ? menus : menus.filter(m => (m.kategori || "").toUpperCase() === filter);
            document.getElementById('menu-count').innerText = `${filtered.length} Hidangan Siap`;

            if(filtered.length === 0) {
                grid.innerHTML = '';
                if(empty) empty.classList.remove('hidden');
                return;
            }

            if(empty) empty.classList.add('hidden');
            grid.innerHTML = filtered.map(m => `
                <div class="card-menu p-2 md:p-4 flex flex-col animate-in fade-in duration-300 rounded-[24px] md:rounded-[35px]" onclick="showProductDetail('${m.id}')">
                    <div class="aspect-square rounded-[18px] md:rounded-[28px] overflow-hidden mb-3 bg-slate-50 relative group">
                        <img src="${m.img_id ? 'https://lh3.googleusercontent.com/d/'+m.img_id : 'https://via.placeholder.com/300?text='+encodeURIComponent(m.nama)}" 
                             class="w-full h-full object-cover transition-transform group-hover:scale-105"
                             onerror="this.src='https://via.placeholder.com/300?text=RM+Pangkalan'">
                        <div class="absolute top-2 right-2 bg-white/90 backdrop-blur-md px-2 py-0.5 rounded-lg text-[6px] md:text-[8px] font-black text-lime-600 uppercase shadow-sm border border-lime-100">
                            ${m.kategori}
                        </div>
                    </div>
                    <div class="flex-1 px-1">
                        <h4 class="font-black text-slate-900 text-[10px] md:text-sm leading-tight uppercase line-clamp-1 mb-2">${m.nama}</h4>
                        <div class="flex justify-between items-center gap-1">
                            <p class="text-lime-600 font-black text-[11px] md:text-base tracking-tighter">Rp ${(parseInt(m.harga_jual || 0)/1000).toFixed(0)}rb</p>
                            <button onclick="event.stopPropagation(); addToCart('${m.id}')" class="w-8 h-8 md:w-10 md:h-10 bg-slate-900 text-white rounded-xl flex items-center justify-center shadow-lg active:bg-lime-500 transition-all">
                                <i data-lucide="plus" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // --- KERANJANG & UI ---
        function addToCart(id) {
            let cart = JSON.parse(localStorage.getItem('user_cart')) || [];
            const menu = menus.find(m => m.id === id);
            if(!menu) return;

            const existing = cart.find(i => i.id === id);
            if(existing) existing.qty += 1;
            else cart.push({ id: menu.id, name: menu.nama, price: menu.harga_jual, qty: 1 });
            
            localStorage.setItem('user_cart', JSON.stringify(cart));
            updateCartUI();
            showToast(`${menu.nama} +1`);
        }

        function updateCartUI() {
            const cart = JSON.parse(localStorage.getItem('user_cart')) || [];
            const count = cart.reduce((acc, curr) => acc + curr.qty, 0);
            const total = cart.reduce((acc, curr) => acc + (curr.qty * curr.price), 0);
            
            const floating = document.getElementById('floating-cart');
            if(count > 0) {
                floating.classList.add('show');
                document.getElementById('cart-count').innerText = count;
                document.getElementById('floating-total').innerText = `Rp ${total.toLocaleString('id-ID')}`;
                document.getElementById('sidebar-total').innerText = `Rp ${total.toLocaleString('id-ID')}`;
            } else {
                floating.classList.remove('show');
            }
            renderSidebarCart();
        }

        function renderSidebarCart() {
            const container = document.getElementById('sidebar-cart-list');
            const cart = JSON.parse(localStorage.getItem('user_cart')) || [];
            if(cart.length === 0) {
                container.innerHTML = `<div class="py-20 text-center opacity-20"><i data-lucide="shopping-bag" class="w-10 h-10 mx-auto mb-2"></i><p class="text-[10px] font-black uppercase">Kosong</p></div>`;
            } else {
                container.innerHTML = cart.map(item => `
                    <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                        <div class="flex-1">
                            <h5 class="font-black text-[10px] uppercase tracking-tighter line-clamp-1">${item.name}</h5>
                            <p class="text-[9px] font-bold text-lime-600">Rp ${parseInt(item.price).toLocaleString('id-ID')}</p>
                        </div>
                        <div class="flex items-center bg-white rounded-xl border p-0.5">
                            <button onclick="adjustQty('${item.id}', -1)" class="w-7 h-7 flex items-center justify-center text-slate-300"><i data-lucide="minus" class="w-3 h-3"></i></button>
                            <span class="w-6 text-center text-[10px] font-black">${item.qty}</span>
                            <button onclick="adjustQty('${item.id}', 1)" class="w-7 h-7 flex items-center justify-center text-slate-900"><i data-lucide="plus" class="w-3 h-3"></i></button>
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        function adjustQty(id, delta) {
            let cart = JSON.parse(localStorage.getItem('user_cart')) || [];
            const idx = cart.findIndex(i => i.id === id);
            if(idx > -1) {
                cart[idx].qty += delta;
                if(cart[idx].qty <= 0) cart.splice(idx, 1);
            }
            localStorage.setItem('user_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function showProductDetail(id) {
            const menu = menus.find(m => m.id === id);
            if(!menu) return;
            const modal = document.getElementById('product-modal');
            document.getElementById('modal-content').innerHTML = `
                <div class="rounded-3xl overflow-hidden mb-6 bg-slate-50 aspect-video md:aspect-square">
                    <img src="${menu.img_id ? 'https://lh3.googleusercontent.com/d/'+menu.img_id : 'https://via.placeholder.com/600'}" class="w-full h-full object-cover">
                </div>
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <span class="px-2 py-1 bg-lime-100 text-lime-600 rounded-lg text-[7px] font-black uppercase">${menu.kategori}</span>
                        <h3 class="text-xl font-black text-slate-900 tracking-tighter mt-2 uppercase leading-none">${menu.nama}</h3>
                    </div>
                    <p class="text-xl font-black text-lime-600 tracking-tighter">Rp ${parseInt(menu.harga_jual).toLocaleString('id-ID')}</p>
                </div>
                <p class="text-slate-400 text-[11px] leading-relaxed mb-8">Disajikan dengan bahan alami tanpa pengawet. Menjaga nutrisi untuk kesehatan tubuh Anda.</p>
                <button onclick="addToCart('${menu.id}'); closeAllUI();" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-[10px] shadow-xl flex items-center justify-center gap-3 active:bg-lime-500">
                    Tambah Ke Keranjang <i data-lucide="plus" class="w-4 h-4"></i>
                </button>
            `;
            document.getElementById('global-overlay').classList.add('show');
            modal.classList.add('show');
            lucide.createIcons();
        }

        function filterCategory(cat) {
            document.querySelectorAll('.category-pill').forEach(btn => {
                const isActive = (btn.id === `cat-${cat}`);
                btn.classList.toggle('active', isActive);
                btn.classList.toggle('text-slate-400', !isActive);
            });
            renderMenu(cat);
        }

        function toggleCartSidebar() {
            document.getElementById('global-overlay').classList.toggle('show');
            document.getElementById('cart-sidebar').classList.toggle('show');
        }

        function closeAllUI() {
            document.getElementById('global-overlay').classList.remove('show');
            document.getElementById('cart-sidebar').classList.remove('show');
            document.getElementById('product-modal').classList.remove('show');
        }

        function showToast(msg) {
            const t = document.getElementById('sync-toast');
            document.getElementById('toast-text').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function renderEmpty() {
            document.getElementById('menu-grid').innerHTML = '';
            document.getElementById('empty-state').classList.remove('hidden');
        }

        window.onload = () => {
            syncMenu();
            lucide.createIcons();
        };
    </script>
</body>
</html>
