<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - RM Pangkalan Natural Resto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; }
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: white; border-right: 1px solid #f0f0f0; }
        .main-content { margin-left: 260px; min-height: 100vh; padding: 24px; }
        .hero-banner { 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&q=80&w=1200');
            background-size: cover; background-position: center;
        }
        @media (max-width: 1023px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding-bottom: 100px; }
            .floating-pill { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 50; }
        }
        .nav-link-active { background-color: #84cc16; color: white; border-radius: 12px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased text-slate-800">

    <!-- DESKTOP SIDEBAR -->
    <aside class="sidebar p-6 flex flex-col no-print">
        <div class="mb-10">
            <h1 class="text-2xl font-bold text-slate-900 leading-tight">Pangkalan</h1>
            <p class="text-[10px] tracking-[0.2em] font-bold text-lime-600 uppercase">Natural Resto</p>
        </div>

        <div class="flex-1 space-y-8">
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest">Menu Utama</p>
                <nav class="space-y-1">
                    <a href="index.html" class="nav-link-active flex items-center gap-3 px-4 py-3 text-sm font-semibold">
                        <i data-lucide="layout-grid" class="w-5 h-5"></i> Beranda
                    </a>
                    <a href="absensi.html" class="flex items-center gap-3 px-4 py-3 text-sm text-slate-500 hover:bg-slate-50 rounded-xl transition">
                        <i data-lucide="user-check" class="w-5 h-5"></i> Area Pegawai
                    </a>
                </nav>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <header class="flex items-center justify-between mb-8">
            <div>
                <h2 class="text-3xl font-extrabold text-slate-900">Beranda</h2>
                <p class="text-xs text-slate-400 flex items-center gap-2" id="sync-status">
                    <span class="w-2 h-2 bg-slate-300 rounded-full animate-pulse"></span> MENYIAPKAN MENU...
                </p>
            </div>
        </header>

        <section class="hero-banner h-64 lg:h-96 rounded-[40px] relative overflow-hidden mb-10 flex items-center px-10">
            <div class="max-w-md animate-in fade-in slide-in-from-left duration-700">
                <p class="text-lime-400 font-bold text-sm mb-2 uppercase tracking-widest">Pilihan Nutrisi Terbaik</p>
                <h3 class="text-4xl lg:text-6xl font-black text-white leading-tight mb-6 italic">RM Pangkalan <br><span class="text-lime-500">Natural Resto</span></h3>
                <button onclick="document.getElementById('menu-section').scrollIntoView({behavior:'smooth'})" class="bg-lime-500 hover:bg-lime-600 text-white px-8 py-3 rounded-full font-bold flex items-center gap-2 transition shadow-xl shadow-lime-900/20">
                    Lihat Menu <i data-lucide="arrow-down" class="w-4 h-4"></i>
                </button>
            </div>
        </section>

        <div id="menu-section">
            <div class="flex gap-3 mb-8 overflow-x-auto no-scrollbar pb-2" id="category-pills">
                <button class="bg-lime-600 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-lg">SEMUA</button>
            </div>

            <div id="menu-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Data dari Cloud akan muncul di sini -->
            </div>
        </div>

        <div id="empty-state" class="hidden py-40 text-center flex flex-col items-center opacity-20">
            <i data-lucide="search-x" class="w-16 h-16 mb-4"></i>
            <p class="text-slate-500 font-bold uppercase tracking-widest text-sm italic">MENU BELUM TERSEDIA</p>
        </div>
    </main>

    <!-- MOBILE NAVIGATION PILL -->
    <div class="lg:hidden floating-pill bg-white/80 backdrop-blur-lg border border-white/50 px-8 py-4 rounded-full flex gap-10 shadow-2xl items-center">
        <a href="index.html" class="text-lime-600"><i data-lucide="home"></i></a>
        <a href="absensi.html" class="text-slate-400"><i data-lucide="user"></i></a>
    </div>

    <script>
        const gasUrl = localStorage.getItem('gas_url') || "";
        let menus = [];

        async function fetchMenu() {
            if(!gasUrl) {
                document.getElementById('sync-status').innerHTML = `<span class="text-red-500">⚠ API URL Belum Diatur Owner</span>`;
                return;
            }

            try {
                const response = await fetch(gasUrl);
                const result = await response.json();
                if(result.status === "success") {
                    menus = result.data.menus;
                    renderMenu();
                    document.getElementById('sync-status').innerHTML = `<span class="w-2 h-2 bg-lime-500 rounded-full"></span> MENU TERUPDATE`;
                }
            } catch (err) {
                console.error("Gagal mengambil menu:", err);
            }
        }

        function renderMenu(filter = "SEMUA") {
            const container = document.getElementById('menu-container');
            const filtered = filter === "SEMUA" ? menus : menus.filter(m => m.kategori === filter);
            
            if(filtered.length === 0) {
                container.innerHTML = '';
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            document.getElementById('empty-state').classList.add('hidden');
            container.innerHTML = filtered.map(m => `
                <div class="bg-white p-4 rounded-[32px] border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all group">
                    <div class="aspect-square bg-slate-50 rounded-[24px] mb-4 overflow-hidden relative shadow-inner">
                        <img src="${m.img_id ? 'https://lh3.googleusercontent.com/d/'+m.img_id : 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&q=80&w=300'}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    </div>
                    <p class="text-[9px] font-black text-lime-600 uppercase tracking-widest mb-1">${m.kategori}</p>
                    <h4 class="font-bold text-slate-800 line-clamp-1">${m.nama}</h4>
                    <div class="flex justify-between items-center mt-3">
                        <p class="text-slate-900 font-black">Rp ${parseInt(m.harga_jual).toLocaleString('id-ID')}</p>
                        <a href="order-online.html" class="w-8 h-8 bg-slate-900 text-white rounded-full flex items-center justify-center shadow-lg hover:bg-lime-600 transition">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </a>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.onload = () => {
            fetchMenu();
            lucide.createIcons();
        };
    </script>
</body>
</html>
